name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  NODE_VERSION: '20'

jobs:
  build-and-test:
    name: Install, Test, Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      # ─────────────────────────────────────────
      # Detect repo layout: monorepo (client/server) vs single package.json
      # ─────────────────────────────────────────
      - name: Detect project structure
        id: detect
        run: |
          if [ -f "client/package.json" ] && [ -f "server/package.json" ]; then
            echo "layout=monorepo" >> "$GITHUB_OUTPUT"
          else
            echo "layout=single" >> "$GITHUB_OUTPUT"
          fi

      # ─────────────────────────────────────────
      # MONOREPO PATH: client
      # ─────────────────────────────────────────
      - name: Install client dependencies
        if: steps.detect.outputs.layout == 'monorepo'
        working-directory: ./client
        run: |
          if [ -f package-lock.json ]; then npm ci; else npm install; fi

      - name: Test client
        if: steps.detect.outputs.layout == 'monorepo'
        working-directory: ./client
        run: |
          if npm run | grep -q " test"; then
            npm run test -- --run
          else
            echo "No test script found in client, skipping."
          fi

      - name: Build client
        if: steps.detect.outputs.layout == 'monorepo'
        working-directory: ./client
        run: |
          if npm run | grep -q " build"; then
            npm run build
          else
            echo "No build script found in client, skipping."
          fi

      - name: Upload client build artifact
        if: steps.detect.outputs.layout == 'monorepo'
        uses: actions/upload-artifact@v4
        with:
          name: client-dist
          path: client/dist
          if-no-files-found: warn
          retention-days: 7

      # ─────────────────────────────────────────
      # MONOREPO PATH: server
      # ─────────────────────────────────────────
      - name: Install server dependencies
        if: steps.detect.outputs.layout == 'monorepo'
        working-directory: ./server
        run: |
          if [ -f package-lock.json ]; then npm ci; else npm install; fi

      - name: Test server
        if: steps.detect.outputs.layout == 'monorepo'
        working-directory: ./server
        run: |
          if npm run | grep -q " test"; then
            npm run test -- --run
          else
            echo "No test script found in server, skipping."
          fi

      - name: Build server
        if: steps.detect.outputs.layout == 'monorepo'
        working-directory: ./server
        run: |
          if npm run | grep -q " build"; then
            npm run build
          else
            echo "No build script found in server, skipping."
          fi

      - name: Upload server build artifact
        if: steps.detect.outputs.layout == 'monorepo'
        uses: actions/upload-artifact@v4
        with:
          name: server-dist
          path: server/dist
          if-no-files-found: warn
          retention-days: 7

      # ─────────────────────────────────────────
      # SINGLE PACKAGE.JSON PATH (root)
      # ─────────────────────────────────────────
      - name: Install dependencies (root)
        if: steps.detect.outputs.layout == 'single'
        run: |
          if [ -f package-lock.json ]; then npm ci; else npm install; fi

      - name: Test (root)
        if: steps.detect.outputs.layout == 'single'
        run: |
          if npm run | grep -q " test"; then
            npm run test -- --run
          else
            echo "No test script found, skipping."
          fi

      - name: Build (root)
        if: steps.detect.outputs.layout == 'single'
        run: |
          if npm run | grep -q " build"; then
            npm run build
          else
            echo "No build script found, skipping."
          fi

      - name: Upload build artifact (root)
        if: steps.detect.outputs.layout == 'single'
        uses: actions/upload-artifact@v4
        with:
          name: build-output
          path: |
            dist
            build
          if-no-files-found: warn
          retention-days: 7