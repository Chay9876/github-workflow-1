name: CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install pipenv
        run: pip install pipenv

      - name: Cache pipenv virtualenv
        uses: actions/cache@v5
        with:
          path: ~/.local/share/virtualenvs
          key: pipenv-${{ runner.os }}-${{ hashFiles('Pipfile.lock') }}
          restore-keys: |
            pipenv-${{ runner.os }}-

      - name: Install dependencies
        run: pipenv install --dev --skip-lock

      - name: Ensure test tooling is present
        run: pipenv run pip install --quiet pytest flake8

      - name: Lint with flake8
        run: pipenv run flake8 . --max-line-length=100 --exclude=.venv,.git,__pycache__
        continue-on-error: true

      - name: Run tests
        run: |
          if find . -name "test_*.py" -o -name "*_test.py" | grep -q .; then
            pipenv run pytest -v
          else
            echo "No test files found (test_*.py or *_test.py) — skipping pytest."
          fi